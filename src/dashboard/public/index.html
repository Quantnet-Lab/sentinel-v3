<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinel v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; background: #0d0d14; }
    body { font-family: 'Inter', system-ui, sans-serif; color: #e2e8f0; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .loading { display:flex; align-items:center; justify-content:center; height:100vh; color:#64748b; font-size:14px; font-family:'Inter',sans-serif; letter-spacing:0.5px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  </style>
</head>
<body>
  <div id="root"><div class="loading">Initialising Sentinel v3…</div></div>
  <script>
    window.onerror = function(msg,src,line,col,err){
      document.getElementById("root").innerHTML=
        '<div class="loading" style="flex-direction:column;gap:16px;padding:32px;text-align:center;font-family:Inter,sans-serif">'+
        '<div style="color:#f1f5f9;font-size:16px;font-weight:600">Dashboard error</div>'+
        '<code style="color:#f43f5e;font-size:12px;max-width:600px">'+String(msg).replace(/</g,"&lt;")+'</code>'+
        '<button onclick="location.reload()" style="margin-top:8px;padding:8px 20px;background:#6366f120;color:#818cf8;border:1px solid #6366f140;border-radius:8px;cursor:pointer;font-family:Inter,sans-serif;font-size:13px">Reload</button></div>';
    };
    (async function(){
      try{
        const res=await fetch('/dashboard-app.jsx');
        if(!res.ok) throw new Error('HTTP '+res.status);
        const code=await res.text();
        const compiled=Babel.transform(code,{presets:['react',['env',{modules:'commonjs'}]]}).code;
        const module={exports:{}};const exports=module.exports;
        const require=(n)=>{if(n==='react')return React;throw new Error('Unsupported: '+n);};
        eval(compiled+'\nwindow.__App=module.exports.default||exports.default;');
        const App=window.__App;
        if(!App) throw new Error('Component not exported');
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
      }catch(err){
        document.getElementById('root').innerHTML=
          '<div class="loading" style="flex-direction:column;gap:16px;padding:32px;text-align:center;font-family:Inter,sans-serif">'+
          '<div style="color:#f1f5f9;font-size:16px;font-weight:600">Failed to load dashboard</div>'+
          '<code style="color:#f43f5e;font-size:12px;max-width:600px">'+String(err).replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</code></div>';
      }
    })();
  </script>
</body>
</html>
